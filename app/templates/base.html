<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block page_title %}BITFISCAL{% endblock %}</title>

    <!-- CSS: caminho relativo direto (funciona mesmo sem url_for) -->
    <link rel="stylesheet" href="/static/style.css" />

    <!-- Fallback inline mínimo -->
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
    </style>
  </head>
  <body>
    {% block content %}{% endblock %} {% block scripts %}{% endblock %}
  </body>
</html>
