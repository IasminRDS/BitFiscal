<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - BITFISCAL</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-container {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }
      .logo {
        text-align: center;
        margin-bottom: 32px;
      }
      .logo h1 {
        color: #fff;
        font-size: 28px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .logo p {
        color: #94a3b8;
        font-size: 14px;
      }
      .form-group {
        margin-bottom: 24px;
      }
      .form-group label {
        display: block;
        color: #e2e8f0;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
      }
      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #0f172a;
        color: #fff;
        font-size: 15px;
        transition: border-color 0.3s;
      }
      .form-group input:focus {
        outline: none;
        border-color: #3b82f6;
      }
      .btn-login {
        width: 100%;
        padding: 14px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
      }
      .btn-login:hover {
        background: #2563eb;
      }
      .error-message {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid #ef4444;
        color: #fca5a5;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 24px;
        font-size: 14px;
      }
      .footer-links {
        margin-top: 24px;
        text-align: center;
      }
      .footer-links a {
        color: #3b82f6;
        text-decoration: none;
        font-size: 14px;
      }
      .footer-links a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <h1>🔷 BITFISCAL</h1>
        <p>Sistema de Gestão e Monitoramento</p>
      </div>

      {% if error %}
      <div class="error-message">⚠️ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/auth/login">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Digite seu usuário"
            required
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Digite sua senha"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn-login">→ Entrar</button>
      </form>

      <div class="footer-links">
        <a href="#">Esqueceu a senha?</a>
      </div>
    </div>
  </body>
</html>
